<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prácticas Profesionales - Panel</title>
    <link rel="stylesheet" href="css/home.css">
</head>
<body>

<header></header>

<script src="../Templates/TemplateJS/Header.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        renderUniversalHeader('operators'); // Cambiamos el tipo
    });
</script>

<div class="container">

    <!-- Filtros de Carrera -->
    <div class="nav-section">
        <div class="nav-title">Carreras Disponibles</div>
        <div class="items-container" id="careerContainer">
            <div class="selectable-item active" data-acronym="all">Todas las carreras</div>
        </div>
    </div>

    <!-- Filtros de Plan -->
    <div class="nav-section">
        <div class="nav-title">Planes de Estudio</div>
        <div class="items-container" id="planContainer">
            <div class="selectable-item active" data-code="all">Todos los planes</div>
        </div>
    </div>

    <div class="info-header">
        <h2 id="currentTitle">Listado de Alumnos</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Buscar por nombre o boleta...">
        </div>
    </div>

    <!-- Estadísticas -->
    <div class="stats-grid" id="statsGrid">
        <!-- Dinámico JS -->
    </div>

    <!-- Tabla de Resultados -->
    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Plan</th>
                <th>Nombre del Alumno</th>
                <th>Boleta</th>
                <th>Estado del Proceso</th>
            </tr>
            </thead>
            <tbody id="studentTableBody">
            <!-- Se llena vía API -->
            </tbody>
        </table>
    </div>

</div>

<footer>
    <p><strong>Instituto Politécnico Nacional</strong> | UPIICSA | © 2025 Sistema ApiSIP</p>
</footer>

<script src="js/home.js"></script>
</body>
</html>
