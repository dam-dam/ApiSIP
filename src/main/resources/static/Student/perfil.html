<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prácticas Profesionales - Perfil</title>
    <link rel="stylesheet" href="css/perfil.css">
    <link rel="stylesheet" href="../master.css">
    
</head>
<body>

<header></header> <script src="../Templates/TemplateJS/Header.js"></script>

<nav class="nav-bar">
    <a href="home.html" class="back-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Volver al Inicio
    </a>
</nav>

<div class="container">

    <!-- LADO IZQUIERDO: IDENTIDAD Y CONTACTO -->
    <aside class="profile-side">
        <div class="card-identity">
            <div class="initial-avatar" id="display-initial">?</div>
            <div class="identity-info">
                <h2 id="info-full-name">Cargando...</h2>
                <p id="info-boleta">Cargando...</p>
            </div>
        </div>

        <section class="info-section" style="padding: 1.5rem;">
            <div class="section-title" style="margin-bottom: 1rem;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                <h3 style="font-size: 0.9rem;">Contacto</h3>
            </div>
            <div style="display: flex; flex-direction: column; gap: 1.2rem;">
                <div class="data-item">
                    <label>Correo Electrónico</label>
                    <div class="val-static" id="info-email">--</div>
                </div>
                <div class="data-item">
                    <label>Teléfono / Móvil</label>
                    <div class="val-static" id="info-phone">--</div>
                </div>
            </div>
        </section>
    </aside>

    <!-- LADO DERECHO: DETALLES -->
    <main class="profile-main">

        <!-- Información Oficial -->
        <section class="info-section">
            <div class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><polyline points="17 11 19 13 23 9"></polyline></svg>
                <h3>Información Institucional</h3>
            </div>
            <div class="data-grid">
                <div class="data-item">
                    <label>Carrera</label>
                    <div class="val-static" id="info-career">--</div>
                </div>
                <div class="data-item">
                    <label>Plan de Estudios</label>
                    <div class="val-static" id="info-plan">--</div>
                </div>
                <div class="data-item">
                    <label>Semestre</label>
                    <div class="val-static" id="info-semester">--</div>
                </div>
                <div class="data-item">
                    <label>Estado en Prácticas</label>
                    <div class="val-static" style="color: var(--primary);" id="info-practice-status">--</div>
                </div>
                <div class="data-item">
                    <label>Unidad Académica</label>
                    <div class="val-static">UPIICSA</div>
                </div>
            </div>
        </section>

        <!-- Seguridad -->
        <section class="info-section" style="display: flex; flex-direction: column;">
            <div class="section-title">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <h3>Seguridad de la Cuenta</h3>
            </div>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem;">Puedes actualizar tu contraseña de acceso al portal en cualquier momento.</p>
            <div class="data-grid">
                <div class="data-item">
                    <label>Nueva Contraseña</label>
                    <input type="password" class="input-field" placeholder="Mínimo 6 caracteres" id="new-password">
                </div>
                <div class="data-item">
                    <label>Confirmar Contraseña</label>
                    <input type="password" class="input-field" placeholder="Repite la contraseña" id="confirm-password">
                </div>
            </div>
            <button class="btn-update" id="btn-update-pwd">Actualizar Contraseña</button>
        </section>

    </main>
</div>

<footer></footer> <script src="../Templates/TemplateJS/Footer.js"></script>


<script src="js/perfil.js"></script>
<script src="/Templates/TemplateJS/AlertModal.js"></script>
</body>
</html>
