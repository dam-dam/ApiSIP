<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generar Cédula - ApiSIP</title>
    <link rel="stylesheet" href="css/generarCedula.css">
    <link rel="stylesheet" href="../master.css">
</head>
<body>
<header></header> <script src="../Templates/TemplateJS/Header.js"></script>


<nav class="nav-bar" id="volver-atras"><script src="../Templates/TemplateJS/VolverAtras.js"></script></nav>
 

<div class="container">

    <form class="form-side" id="cedulaForm" novalidate>

        <!-- SECCIÓN 1: DIRECCIÓN ALUMNO -->
        <section class="form-section">
            <div class="section-title">Domicilio del Alumno</div>
            <div class="input-grid">
                <div class="input-group full">
                    <label>Calle</label>
                    <input type="text" id="studentStreet" required placeholder="Nombre de la calle">
                </div>
                <div class="input-group">
                    <label>Número</label>
                    <input type="text" id="studentNumber" required placeholder="Ej. 123">
                </div>
                <div class="input-group">
                    <label>Código Postal</label>
                    <input type="text" id="studentZipCode" required maxlength="5" placeholder="08400">
                </div>
                <div class="input-group full">
                    <label>Colonia</label>
                    <input type="text" id="studentNeighborhood" required placeholder="Nombre de la colonia">
                </div>
                <div class="input-group full">
                    <label>Estado</label>
                    <select id="studentStateId" required>
                        <option value="">Selecciona un estado...</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- SECCIÓN 2: INFORMACIÓN EMPRESA -->
        <section class="form-section">
            <div class="section-title">Información de la Empresa</div>
            <div class="input-grid">
                <div class="input-group full">
                    <label>Razón Social</label>
                    <input type="text" id="companyName" required placeholder="Nombre de la Empresa (SIBOLTRA)">
                </div>
                <div class="input-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="companyEmail" required placeholder="empresa@ejemplo.com">
                </div>
                <div class="input-group">
                    <label>Teléfono</label>
                    <input type="tel" id="companyPhone" required placeholder="5512345678">
                </div>
                <div class="input-group">
                    <label>Extensión</label>
                    <input type="text" id="companyExtension" placeholder="Ej. 101">
                </div>
                <div class="input-group">
                    <label>FAX</label>
                    <input type="text" id="companyFax" placeholder="Opcional">
                </div>
                <div class="input-group full">
                    <label>Sector de la Empresa</label>
                    <select id="companySector" required>
                        <option value="PUBLICO">Público</option>
                        <option value="PRIVADO">Privado</option>
                    </select>
                </div>

                <!-- Supervisor / Responsable -->
                <div class="input-group full">
                    <label>Responsable del Alumno</label>
                    <div class="double-group">
                        <select id="companySupervisorGrade" required>
                            <option value="Lic.">Lic.</option>
                            <option value="Ing.">Ing.</option>
                            <option value="Mtro.">Mtro.</option>
                            <option value="Dr.">Dr.</option>
                        </select>
                        <input type="text" id="companySupervisor" required placeholder="Nombre del responsable">
                    </div>
                </div>

                <div class="input-group">
                    <label>Puesto del Responsable</label>
                    <input type="text" id="companyPositionSupervisor" required placeholder="Ej. Gerente de TI">
                </div>
                <div class="input-group">
                    <label>Puesto del Alumno</label>
                    <input type="text" id="companyPositionStudent" required placeholder="Ej. Desarrollador Junior">
                </div>

                <!-- DIRECCIÓN EMPRESA -->
                <div class="input-group full" style="margin-top: 1rem; border-top: 1px solid #eee; padding-top: 1rem;">
                    <label style="color: var(--primary-dark)">Dirección de la Empresa</label>
                </div>
                <div class="input-group full">
                    <label>Calle</label>
                    <input type="text" id="companyStreet" required>
                </div>
                <div class="input-group">
                    <label>Número</label>
                    <input type="text" id="companyNumber" required>
                </div>
                <div class="input-group">
                    <label>C.P.</label>
                    <input type="text" id="companyZipCode" required maxlength="5">
                </div>
                <div class="input-group full">
                    <label>Colonia</label>
                    <input type="text" id="companyNeighborhood" required>
                </div>
                <div class="input-group full">
                    <label>Estado</label>
                    <select id="companyStateId" required>
                        <option value="">Selecciona un estado...</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn-generate" id="submitBtn">Generar PDF de Cédula</button>
        </section>
    </form>

    <aside class="preview-side">
        <div class="pdf-viewer" id="viewerContainer">
            <div class="placeholder-text" id="placeholder">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity: 0.3; margin-bottom: 1rem;">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
                <p>Completa el formulario y presiona "Generar" para visualizar tu cédula aquí.</p>
            </div>
        </div>
        <a href="#" class="btn-download" id="downloadBtn" download="Cedula_Registro.pdf">Descargar Cédula</a>
    </aside>

</div>
<footer></footer> <script src="../Templates/TemplateJS/Footer.js"></script>

<script src="js/generarCedula.js"></script>
<script src="/Templates/TemplateJS/AlertModal.js"></script>
</body>
</html>
